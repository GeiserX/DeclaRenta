name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']

jobs:
  test:
    # Public fork PRs run arbitrary dependency scripts and test code. Keep this
    # validation on GitHub-hosted infrastructure, not private self-hosted runners.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Build
        run: npm run build

      - name: Smoke test CLI package
        run: |
          test -f dist/cli.js
          node dist/cli.js --version
          npm pack --dry-run
